version: '3.8'

services:
  delycia-server:
    container_name: delycia-server-container
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8020:8020"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      # Database
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_DIALECT=${DB_DIALECT}
      
      # Server config
      - PORT=8020
      - NODE_ENV=production
      
      # Secrets
      - ACCESS_SECRET=${ACCESS_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
      - HMAC_SECRECT=${HMAC_SECRECT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # CORS
      - ORIGIN=${ORIGIN}
      - SSL=${SSL}
      
      # MSG91 WhatsApp
      - MSG91_AUTH_KEY=${MSG91_AUTH_KEY}
      - MSG91_INTEGRATED_NUMBER=${MSG91_INTEGRATED_NUMBER}
      - MSG91_TEMPLATE_NAMESPACE=${MSG91_TEMPLATE_NAMESPACE}
      - MAGIC_LINK_BASE_URL=${MAGIC_LINK_BASE_URL}
      - MAGIC_LINK_EXPIRY_MINUTES=${MAGIC_LINK_EXPIRY_MINUTES}
