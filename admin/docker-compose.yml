services:
  delycia-admin:
    container_name: delycia-admin-container
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_WS_SERVER_URL: ${VITE_WS_SERVER_URL}
        VITE_APP_URL: ${VITE_APP_URL}
        IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
        IMAGEKIT_PUBLIC_URL_ENDPOINT: ${IMAGEKIT_PUBLIC_URL_ENDPOINT}
    restart: unless-stopped
    ports:
      - "4500:4500"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL}
      - VITE_WS_SERVER_URL=${VITE_WS_SERVER_URL}
      - VITE_APP_URL=${VITE_APP_URL}
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PUBLIC_URL_ENDPOINT=${IMAGEKIT_PUBLIC_URL_ENDPOINT}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - CRYPTO_SECRET_KEY=${CRYPTO_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4500
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        
        # Sync package.json and rebuild
        - action: rebuild
          path: package.json
        
        # Sync other config files
        - action: sync
          path: ./public
          target: /app/public