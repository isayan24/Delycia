services:
  delycia-superadmin:
    container_name: delycia-superadmin-container
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_APP_URL: ${VITE_APP_URL}
    restart: unless-stopped
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL}
      - VITE_APP_URL=${VITE_APP_URL}
      - VITE_INTERNAL_SERVER_URL=${VITE_INTERNAL_SERVER_URL}
      - IS_DOCKER=true
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=5000
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        
        # Sync package.json and rebuild
        - action: rebuild
          path: package.json
        
        # Sync other config files
        - action: sync
          path: ./public
          target: /app/public
